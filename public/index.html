<!doctype html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8" />
    <title>Phaser Star Elman</title>
    <script src="//cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 300 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    var game = new Phaser.Game(config);

    function preload ()
    {
        this.load.image('sky', 'assets/sky.png');
        this.load.image('ground', 'assets/platform.png');
        this.load.image('star', 'assets/star.png');
        this.load.image('bomb', 'assets/bomb.png');
        this.load.spritesheet('dude', 
            'assets/dude.png',
            { frameWidth: 32, frameHeight: 48 }
        );
        this.load.audio('theme', 'assets/bgmusic.mp3');
        this.load.audio('sfx', 'assets/sfx.mp3');
    }
    var player;
    var stars;
    var bombs;
    var platforms;
    var cursors;
    var score = 0;
    var gameOver = false;
    var scoreText;
    var collectedStars = 0;

    function create ()
    {
        let music = this.sound.add('theme');
        music.loop = true;
        music.play();

        music.setVolume(0.1);
        cursors = this.input.keyboard.createCursorKeys();

        this.add.image(400, 300, 'sky');
        platforms = this.physics.add.staticGroup();

        loadLevel();

        player = this.physics.add.sprite(100, 450, 'dude');

        player.setBounce(0.2);
        player.setCollideWorldBounds(true);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });
        
        stars = this.physics.add.group({
            key: 'star',
            repeat: 11,
            setXY: { x: 12, y: 0, stepX: 70 }
        });

        stars.children.iterate(function (child) {

            child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));

        });

        bombs = this.physics.add.group();
        
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(stars, platforms);
        this.physics.add.collider(bombs, platforms);

        this.physics.add.overlap(player, stars, collectStar, null, this);
        this.physics.add.collider(player, bombs, hitBomb, null, this);
        

        scoreText = this.add.text(16, 16, 'score: 0', { fontSize: '32px', fill: '#000' });
        starsText = this.add.text(530, 16, 'Stars Collected: 0', { fontSize: '24px', fill: '#000' });
    }

    function update ()
    {
        if (gameOver)
        {
            return;
        }
        if (cursors.left.isDown)
        {
            player.setVelocityX(-160);

            player.anims.play('left', true);
        }
        else if (cursors.right.isDown)
        {
            player.setVelocityX(160);

            player.anims.play('right', true);
        }
        else
        {
            player.setVelocityX(0);

            player.anims.play('turn');
        }

        if (cursors.up.isDown && player.body.touching.down)
        {
            player.setVelocityY(-330);
        }
             
    }
    function collectStar (player, star)
    {
        star.disableBody(true, true);
        let sound = this.sound.add('sfx');
        sound.play();
        sound.setVolume(0.1);

        score += 10;
        scoreText.setText('Score: ' + score);
        
        var newStar = stars.create(Phaser.Math.Between(0, 800), 0, 'star');
        newStar.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));

        var tint = Phaser.Display.Color.RandomRGB();
        player.setTint(tint.color);

        collectedStars++;
        starsText.setText('Stars Collected: ' + collectedStars);
        // if (collectedStars % 5 === 0)
        // {
        //     player.setScale(player.scaleX * 1.1, player.scaleY * 1.1);
        // }
        if(score >= 100)
        {
            levelComplete();
        }
    }
    function hitBomb (player, bomb)
    {
        this.physics.pause();

        player.setTint(0xff0000);

        player.anims.play('turn');

        gameOver = true;
    }
    function levelComplete()
    {
        console.log("Level Complete! You collected all the stars!");
        destroyLevel();
        loadLevel();
    }
    function destroyLevel()
    {
        platforms.clear(true, true);
        //stars.clear(true, true);
        bombs.clear(true, true);
        score = 0;
        scoreText.setText('Score: ' + score);

    }
    function loadLevel()
    {
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();
        platforms.create(Math.random() * 800, 400, 'ground');
        platforms.create(Math.random() * 800, 250, 'ground');
        platforms.create(Math.random() * 800, 220, 'ground');
    }

</script>

</body>
</html>
